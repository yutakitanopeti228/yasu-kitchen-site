<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasu's Kitchen | 最新投稿</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-color: #ff7f50; --bg-color: #f9f9f9; }
        body { font-family: sans-serif; margin: 0; background: var(--bg-color); text-align: center; }
        .container { max-width: 935px; margin: 0 auto; padding: 20px; }
        #ig-feed { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .post-card { aspect-ratio: 1/1; overflow: hidden; background: #ddd; border-radius: 4px; }
        .post-image { width: 100%; height: 100%; object-fit: cover; }
        .ig-link-button { 
            display: inline-block; margin-top: 30px; padding: 12px 24px; 
            background: linear-gradient(45deg, #f09433, #bc1888); color: white; 
            text-decoration: none; border-radius: 8px; font-weight: bold; 
        }
        @media (max-width: 600px) { #ig-feed { gap: 3px; } }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: #333;"><i class="fab fa-instagram"></i> @yasuz.kitchen 最新の投稿</h2>
        <div id="ig-feed">
            <!-- JavaScriptでここに画像が挿入されます -->
        </div>
        <a href="https://www.instagram.com/yasuz.kitchen/" target="_blank" class="ig-link-button">
            Instagramで続きを見る
        </a>
    </div>

    <script>
        async function loadLatestPosts() {
    try {
        // Pythonで生成したJSONファイルを読み込む
        const response = await fetch('posts.json');
        const posts = await response.json();

        const feedContainer = document.getElementById('ig-feed');
        feedContainer.innerHTML = ''; // 中身をリセット

        posts.forEach(post => {
            const div = document.createElement('div');
            div.className = 'post-card';
            div.innerHTML = `
                <a href="${post.link}" target="_blank">
                    <img src="${post.url}" alt="Instagram Post" class="post-image">
                </a>
            `;
            feedContainer.appendChild(div);
        });
    } catch (error) {
        console.error("データの読み込みに失敗しました:", error);
    }
}

// ページ読み込み時に実行
loadLatestPosts();
    </script>
</body>
</html>
